<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebGIS App - Leaflet.js</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <i class="fa-solid fa-globe"></i>
        <span>WebGIS</span>
      </div>
      <button id="sidebar-toggle" title="Thu/mở sidebar">
        <i class="fa-solid fa-bars"></i>
      </button>
    </div>
    
    <div class="sidebar-section">
      <div class="section-title"><i class="fa-solid fa-magnifying-glass"></i> Tìm kiếm địa điểm</div>
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Nhập địa điểm..." />
        <button id="search-btn"><i class="fa-solid fa-search"></i></button>
      </div>
      <div id="search-results"></div>
    </div>

    <div class="sidebar-section">
      <div class="section-title"><i class="fa-solid fa-layer-group"></i> Lớp bản đồ nền</div>
      <div class="basemap-grid">
        <div class="basemap-item active" data-layer="osm">
          <div class="basemap-thumb osm-thumb"></div>
          <span>OSM</span>
        </div>
        <div class="basemap-item" data-layer="satellite">
          <div class="basemap-thumb sat-thumb"></div>
          <span>Vệ tinh</span>
        </div>
        <div class="basemap-item" data-layer="topo">
          <div class="basemap-thumb topo-thumb"></div>
          <span>Địa hình</span>
        </div>
        <div class="basemap-item" data-layer="dark">
          <div class="basemap-thumb dark-thumb"></div>
          <span>Tối</span>
        </div>
        <div class="basemap-item" data-layer="none">
          <div class="basemap-thumb none-thumb"></div>
          <span>CT Map</span>
        </div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="section-title"><i class="fa-solid fa-wrench"></i> Công cụ vẽ</div>
      <div class="tools-grid">
        <button class="tool-btn" id="tool-marker" title="Thêm điểm">
          <i class="fa-solid fa-location-dot"></i><span>Điểm</span>
        </button>
        <button class="tool-btn" id="tool-polyline" title="Vẽ đường">
          <i class="fa-solid fa-draw-polygon"></i><span>Đường</span>
        </button>
        <button class="tool-btn" id="tool-polygon" title="Vẽ vùng">
          <i class="fa-regular fa-square"></i><span>Vùng</span>
        </button>
        <button class="tool-btn" id="tool-circle" title="Vẽ vòng tròn">
          <i class="fa-regular fa-circle"></i><span>Tròn</span>
        </button>
        <button class="tool-btn" id="tool-measure" title="Đo khoảng cách">
          <i class="fa-solid fa-ruler"></i><span>Đo</span>
        </button>
        <button class="tool-btn danger" id="tool-clear" title="Xóa tất cả">
          <i class="fa-solid fa-trash"></i><span>Xóa</span>
        </button>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="section-title"><i class="fa-solid fa-file-import"></i> Upload dữ liệu</div>

      <div class="upload-tabs">
        <button class="upload-tab active" data-tab="vector">
          <i class="fa-solid fa-vector-square"></i> Vector
        </button>
        <button class="upload-tab" data-tab="raster">
          <i class="fa-solid fa-image"></i> Raster
        </button>
      </div>

      <div class="upload-tab-content" id="tab-vector">
        <label class="upload-btn">
          <i class="fa-solid fa-upload"></i> Chọn file GeoJSON / JSON
          <input type="file" id="geojson-upload" accept=".geojson,.json,.kml,.zip" hidden />
        </label>
        <div id="upload-info"></div>
      </div>

      <div class="upload-tab-content hidden" id="tab-raster">
        <label class="upload-btn raster-btn">
          <i class="fa-solid fa-layer-group"></i> Chọn file GeoTIFF (.tif)
          <input type="file" id="raster-upload" accept=".tif,.tiff" hidden />
        </label>
        <div id="raster-info"></div>

        <div id="raster-controls" class="hidden">
          <div class="opacity-row">
            <label>Độ trong suốt:</label>
            <input type="range" id="raster-opacity" min="0" max="1" step="0.05" value="0.85" />
            <span id="opacity-val">85%</span>
          </div>
          <button id="raster-remove-btn" class="remove-raster-btn">
            <i class="fa-solid fa-trash"></i> Xóa Raster
          </button>
        </div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="section-title"><i class="fa-solid fa-list"></i> Đối tượng đã vẽ</div>
      <div id="features-list"><p class="empty-msg">Chưa có đối tượng nào</p></div>
    </div>
  </div>

  <div id="map"></div>

  <div id="status-bar">
    <span id="coords">📍 Di chuột lên bản đồ để xem tọa độ</span>
    <span id="zoom-level">Zoom: 5</span>
    <span id="measure-result"></span>
  </div>

  <div id="info-panel" class="hidden">
    <div class="info-header">
      <span id="info-title">Thông tin</span>
      <button id="info-close"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div id="info-body"></div>
  </div>

  <div id="upload-form">
      <input type="text" id="point-name" placeholder="Tên địa điểm">
      <input type="file" id="image-input" accept="image/*">
      <button onclick="handleUpload()">Lưu địa điểm & Ảnh</button>
  </div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="https://cdn.jsdelivr.net/npm/geotiff@2.1.3/dist-browser/geotiff.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/@mapbox/togeojson"></script>
<script src="https://unpkg.com/shpjs@latest/dist/shp.js"></script>

  <script src="js/config.js"></script>
  <script src="js/map.js"></script>

  <script src="js/layers.js"></script>
  <script src="js/tools.js"></script>
  <script src="js/search.js"></script>
  <script src="js/upload.js"></script>
  <script src="js/ui.js"></script>

</body>
</html>
